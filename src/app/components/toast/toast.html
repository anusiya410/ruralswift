<div id="toast-container">
  @for (toast of toastSvc.toasts(); track trackById($index, toast)) {
    <div
      class="toast-item toast-item--{{ toast.type }}"
      role="alert"
      aria-live="polite"
    >
      <span class="toast-icon">{{ icon(toast.type) }}</span>
      <span class="toast-message">{{ toast.message }}</span>
      <button class="toast-close" (click)="dismiss(toast.id)" aria-label="Dismiss">×</button>
    </div>
  }
</div>
