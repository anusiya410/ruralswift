<div id="loading-curtain" [class.hidden]="isHidden()">
  <div class="center-stage">
    <div class="brand-logo">
      <div class="logo-mark">
        <!-- Outer orbit ring (counter-clockwise) -->
        <svg class="orbit-ring orbit-ring--outer" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="48" fill="none" stroke="white" stroke-width="0.5"
            stroke-dasharray="30 20 5 15" opacity="0.15" />
          <circle cx="50" cy="50" r="48" fill="none" stroke="white" stroke-width="2"
            stroke-dasharray="1 95" stroke-linecap="round" opacity="0.9" />
        </svg>
        <!-- Inner orbit ring (clockwise) -->
        <svg class="orbit-ring orbit-ring--inner" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="48" fill="none" stroke="white" stroke-width="0.5"
            stroke-dasharray="15 15 40 10" opacity="0.25" />
          <circle cx="50" cy="50" r="48" fill="none" stroke="#10B981" stroke-width="1.5"
            stroke-dasharray="2 80" stroke-linecap="round" />
        </svg>
        <!-- Logo image -->
        <img
          [src]="'https://ik.imagekit.io/pswnvzqkb7/logo.png?updatedAt=1783483663858'"
          alt="RuralSwift"
          class="loading-logo brand-logo-img brand-logo-img--loading"
          (error)="handleImageError($event, brandLogoFallback)"
          [attr.decoding]="'async'"
        />
      </div>
    </div>

    <div class="loading-info">
      <div class="percent-display">
        <span class="percent-number tabular-nums">{{ percent() }}</span>
        <span class="percent-symbol">%</span>
      </div>
      <div class="status-text">{{ statusText() }}</div>
    </div>
  </div>

  <!-- Bottom progress bar -->
  <div class="progress-container">
    <div class="progress-bar" [style.width.%]="percent()"></div>
  </div>
</div>
