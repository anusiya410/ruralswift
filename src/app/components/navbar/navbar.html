<!-- ===========================
     DESKTOP HEADER
     =========================== -->
<header class="desktop-header">

  <!-- Main Nav Bar -->
  <div class="main-nav">

    <!-- Logo -->
    <a class="logo-wrap" routerLink="/home">
      <span class="logo-text">RuralSwift</span>
    </a>

    <!-- Delivery Location -->
    <div class="location-wrap">
      <svg class="location-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12S4 16 4 10a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
      <div class="location-text">
        <span class="deliver-label">Deliver to</span>
        <span class="deliver-village">Select your village</span>
      </div>
    </div>

    <!-- Search Bar -->
    <div class="search-bar">
      <button class="search-cat-btn">
        All
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
      </button>
      <input type="text" placeholder="Search RuralSwift" class="search-input" />
      <button class="search-submit-btn" aria-label="Search">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      </button>
    </div>

    <!-- Account & Lists -->
    <a class="nav-action-item" routerLink="/dashboard">
      <span class="nav-action-top">Hello, sign in</span>
      <span class="nav-action-bottom">Account &amp; Lists
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
      </span>
    </a>

    <!-- Returns & Orders -->
    <a class="nav-action-item" routerLink="/dashboard" [queryParams]="{section:'orders'}">
      <span class="nav-action-top">Returns</span>
      <span class="nav-action-bottom">&amp; Orders</span>
    </a>

    <!-- Cart -->
    <a class="cart-btn" routerLink="/cart">
      <div class="cart-icon-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
        <span class="cart-count">{{ cartCount }}</span>
      </div>
      <span class="cart-label">Cart</span>
    </a>

  </div>

  <!-- Sub Nav Bar -->
  <div class="sub-nav">
    <button class="sub-nav-all">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
      All
    </button>
    <a routerLink="/home" class="sub-nav-link">Today's Deals</a>
    <a routerLink="/products" class="sub-nav-link">Farming Equipment</a>
    <a routerLink="/home" class="sub-nav-link">Customer Service</a>
    <a routerLink="/products" class="sub-nav-link">Groceries</a>
    <a routerLink="/home" class="sub-nav-link">Sell</a>
    <a routerLink="/seller-hub" class="sub-nav-link seller-hub-link" routerLinkActive="active-subnav">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m2 7 4.41-4.41A2 2 0 0 1 7.83 2h8.34a2 2 0 0 1 1.42.59L22 7"/><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><path d="M15 22v-4a2 2 0 0 0-2-2h-2a2 2 0 0 0-2 2v4"/><path d="M2 7h20"/><path d="M22 7v3a2 2 0 0 1-2 2a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 16 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 12 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 8 12a2.7 2.7 0 0 1-1.59-.63.7.7 0 0 0-.82 0A2.7 2.7 0 0 1 4 12a2 2 0 0 1-2-2V7"/></svg>
      Seller Hub
    </a>
  </div>

</header>


<!-- ===========================
     MOBILE HEADER
     =========================== -->
<header class="mobile-header">

  <!-- Top row: logo + icons -->
  <div class="mobile-top-row">
    <a routerLink="/home" class="mobile-logo">RuralSwift</a>
    <div class="mobile-header-icons">
      <a routerLink="/dashboard" class="mobile-icon-link">
        <span class="mobile-signin">Sign in</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>
      </a>
      <a routerLink="/cart" class="mobile-cart-icon-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
        <span class="mobile-cart-badge">{{ cartCount }}</span>
      </a>
    </div>
  </div>

  <!-- Search row -->
  <div class="mobile-search-row">
    <input type="text" placeholder="Search products..." class="mobile-search-input" />
    <button class="mobile-search-btn" aria-label="Search">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    </button>
  </div>

  <!-- Delivery strip -->
  <div class="mobile-delivery-strip">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12S4 16 4 10a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
    <span>Deliver to — Select your village</span>
  </div>

</header>
