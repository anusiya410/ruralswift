<!-- LOGIN PAGE -->
<div class="auth-page">

  <!-- ═══ LEFT PANEL ═══ -->
  <div class="auth-left">
    <div class="auth-brand">
      <div class="brand-logo">🏪</div>
      <h1 class="brand-title">RuralSwift</h1>
      <p class="brand-sub">Fast, reliable deliveries connecting rural India with everything they need.</p>
    </div>
    <div class="benefits">
      <div class="benefit-item">
        <span class="benefit-icon">🛡️</span>
        <span class="benefit-text">100% Secure Payments</span>
      </div>
      <div class="benefit-item">
        <span class="benefit-icon">🚚</span>
        <span class="benefit-text">Same-Day Delivery Available</span>
      </div>
      <div class="benefit-item">
        <span class="benefit-icon">🎧</span>
        <span class="benefit-text">24/7 Customer Support</span>
      </div>
    </div>
  </div>

  <!-- ═══ RIGHT FORM ═══ -->
  <div class="auth-right">
    <div class="auth-card">
      
      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active">Sign In</button>
        <button class="auth-tab" routerLink="/register">Register</button>
      </div>

      <h2 class="auth-heading">Welcome Back</h2>

      <div *ngIf="errorMessage" class="auth-error">
        ⚠️ {{ errorMessage }}
      </div>

      <form (ngSubmit)="login()" #loginForm="ngForm" class="auth-form">
        
        <div class="form-field">
          <label for="email">Email Address</label>
          <input id="email" type="email" class="form-input" placeholder="rural@example.com"
            [(ngModel)]="email" name="email" required autocomplete="email" />
        </div>
        
        <div class="form-field">
          <label for="password">Password</label>
          <input id="password" type="password" class="form-input" placeholder="Your password"
            [(ngModel)]="password" name="password" required autocomplete="current-password" />
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin: 8px 0;">
          <label style="display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-secondary); cursor: pointer;">
            <input type="checkbox" [(ngModel)]="rememberMe" name="rememberMe" style="accent-color: var(--primary);">
            <span>Remember me</span>
          </label>
          <a routerLink="/forgot-password" style="font-size: 13px; color: var(--primary); font-weight: 600; text-decoration: none;">Forgot Password?</a>
        </div>

        <button type="submit" class="auth-submit" [disabled]="isLoading">
          {{ isLoading ? 'Processing...' : 'Sign In to Dashboard' }}
        </button>
      </form>
    </div>
  </div>

</div>
