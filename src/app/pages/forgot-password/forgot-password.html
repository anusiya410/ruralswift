<div class="auth-page">
  <!-- Left Decorative Panel -->
  <div class="auth-panel">
    <div class="panel-logo">
      <i class="bi bi-box-seam"></i>
      <span>RuralSwift</span>
    </div>
    <div class="panel-content">
      <h1>Password Recovery</h1>
      <p>Enter your email to receive instructions on how to reset your password and get back to shopping.</p>
    </div>
    <div class="panel-badges">
      <div class="badge-item">
        <i class="bi bi-shield-check"></i>
        <span>Secure Account Recovery</span>
      </div>
    </div>
  </div>

  <!-- Right Form Side -->
  <div class="auth-form-side">
    <div class="form-header">
      <h2>Forgot Password?</h2>
      <p>No worries, we'll send you reset instructions.</p>
    </div>

    <form>
      <div class="form-group">
        <label>Email ID</label>
        <div class="input-wrap">
          <i class="bi bi-envelope"></i>
          <input type="email" placeholder="Enter your registered email" required>
        </div>
      </div>

      <button type="button" class="auth-btn">
        Send Reset Link
      </button>
    </form>

    <div class="auth-footer">
      Remembered your password? <a routerLink="/login">Back to Login</a>
    </div>
  </div>
</div>
